<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Caseron 32</title>
  <link rel="stylesheet" href="styles.css?v=1.3">
</head>
<body>
  <header class="topbar">
    <div class="brand brand-left">
      <div class="menu-wrap">
        <button class="menu-button" id="menuButton" type="button" aria-label="Abrir menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="menu-dropdown" id="menuDropdown" aria-label="Menu principal">
          <a href="index.html">Altamira</a>
          <button type="button">Login admin</button>
        </nav>
      </div>

      <div class="mark">LC</div>
      <div>
        <span>GRUPO MINERO</span>
        <strong>LAS CENIZAS</strong>
      </div>
    </div>

    <h1>SISTEMA MICA</h1>

    <div class="brand brand-right">
      <strong>P.IP</strong>
      <span>CONECTADOS<br>CON TUS IDEAS</span>
    </div>
  </header>

  <main class="detail-page">
    <section class="detail-equipment-panel">
      <div>
        <span class="label">EQUIPO</span>
        <strong>Caserón 32</strong>
      </div>

      <div class="connection disconnected">
        <span class="status-dot error"></span>
        <strong>DESCONECTADO</strong>
      </div>
    </section>

    <section class="detail-coils-grid" aria-label="Detalle Caseron 32">
      <article class="detail-coil-card">
        <h2>Coil 0: 30 Metros</h2>
        <div class="detail-lights">
          <span class="light" aria-label="30 metros luz izquierda"></span>
          <span class="light" aria-label="30 metros luz derecha"></span>
        </div>
      </article>

      <article class="detail-coil-card">
        <h2>Coil 1: 50 Metros</h2>
        <div class="detail-lights">
          <span class="light" aria-label="50 metros luz izquierda"></span>
          <span class="light" aria-label="50 metros luz derecha"></span>
        </div>
      </article>

      <article class="detail-coil-card">
        <h2>Coil 2: 80 Metros</h2>
        <div class="detail-lights">
          <span class="light" aria-label="80 metros luz izquierda"></span>
          <span class="light" aria-label="80 metros luz derecha"></span>
        </div>
      </article>

      <article class="history-card">
        <h2>Historial de Activaciones</h2>
      </article>
    </section>
  </main>

  <script src="menu.js?v=1.3"></script>
</body>
</html>
